<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Department Store System – Sign In</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Bokeh background -->
  <div class="bg"></div>
  <div class="bokeh">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- Login card -->
  <div class="card">

    <!-- Brand bar -->
    <div class="brand-bar">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4zM3 6h18M16 10a4 4 0 0 1-8 0"/>
        </svg>
      </div>
      <span class="brand-name">Department Store System</span>
    </div>

    <!-- Form body -->
    <div class="card-body">
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to continue</p>

      <!-- Error message -->
      <div class="error-msg" id="errorMsg">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8"  x2="12"    y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errorText">Username or password is incorrect.</span>
      </div>

      <!-- Username field -->
      <div class="field">
        <span class="field-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
        <input type="text" id="username"
               placeholder="Enter username"
               autocomplete="username"/>
      </div>

      <!-- Password field -->
      <div class="field">
        <span class="field-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path stroke-linecap="round" d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input type="password" id="password"
               placeholder="Enter password"
               autocomplete="current-password"/>
        <button class="toggle-pw" id="togglePw"
                type="button" aria-label="Show password">
          <svg id="eyeIcon" fill="none" viewBox="0 0 24 24"
               stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <!-- Remember me / Forgot password -->
      <div class="extras">
        <label class="remember">
          <input type="checkbox" id="rememberMe"> Remember me
        </label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>

      <!-- Sign in button -->
      <button class="btn-signin" id="signInBtn" type="button">
        <span class="btn-text">Sign In</span>
        <span class="spinner"></span>
      </button>

      <!-- Divider -->
      <div class="divider"><span>or</span></div>

      <!-- Guest button -->
      <button class="btn-guest" id="guestBtn" type="button" onclick="window.location.href='index.html'">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16 7a4 4 0 1 1-8 0 4 4 0 0 1 8 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 14c-5 0-8 2.5-8 4v1h16v-1c0-1.5-3-4-8-4z"/>
        </svg>
        Continue as Guest
      </button>
    </div>

  </div><!-- /.card -->

  <!-- JavaScript -->
  <script src="js/main.js"></script>
</body>
</html>
