<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Department Store – Homepage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar">

  <div class="sidebar-logo">
    <div class="logo-icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </div>
    <span class="logo-text">Department<br>Store</span>
  </div>

  <nav class="sidebar-nav">
    <a class="nav-link active" href="#">Homepage</a>
    <a class="nav-link" href="#">Product Catalog</a>
    <a class="nav-link" href="#">Shop Directory</a>
  </nav>

</aside>

<!-- ══ MAIN ══ -->
<div class="main">

  <!-- TOPBAR -->
  <header class="topbar">
    <span class="topbar-title">Homepage</span>
    <button class="btn-login" onclick="window.location.href='index.html'">Login</button>
  </header>

  <!-- CONTENT -->
  <main class="content">

    <h1 class="page-title">Department Store</h1>

    <!-- PROMOTION SECTION -->
    <div class="section">
      <div class="section-label">Promotion</div>
      <div class="carousel-container">
        <button class="arrow-btn" id="promoLeft" aria-label="Previous" disabled>
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <div class="carousel-viewport">
          <div class="carousel-track" id="promoTrack"></div>
        </div>
        <button class="arrow-btn" id="promoRight" aria-label="Next">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- PRODUCTS SECTION -->
    <div class="section">
      <div class="section-label">Products</div>
      <div class="carousel-container">
        <button class="arrow-btn" id="prodLeft" aria-label="Previous" disabled>
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <div class="carousel-viewport">
          <div class="carousel-track" id="prodTrack"></div>
        </div>
        <button class="arrow-btn" id="prodRight" aria-label="Next">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    </div>

  </main>
</div>

<script>
/* ── DATA ── */
const promoData = [
  { exp: '11/11/26' }, { exp: '11/11/26' },
  { exp: '11/11/26' }, { exp: '11/11/26' },
  { exp: '30/06/26' }, { exp: '31/12/26' },
];

const productData = [
  { name: 'ประตู',    emoji: '🚪' },
  { name: 'ประตู',    emoji: '🚪' },
  { name: 'ประตู',    emoji: '🚪' },
  { name: 'ประตู',    emoji: '🚪' },
  { name: 'หน้าต่าง', emoji: '🪟' },
  { name: 'โซฟา',    emoji: '🛋️' },
];

/* ── BUILD PROMO CARDS ── */
const promoTrack = document.getElementById('promoTrack');
promoData.forEach(p => {
  const card = document.createElement('div');
  card.className = 'promo-card';
  card.innerHTML = `
    <div class="promo-img-area">
      <div class="promo-badge">Promotion</div>
    </div>
    <div class="promo-footer">
      <span class="exp-label">Expired Date:${p.exp}</span>
    </div>`;
  promoTrack.appendChild(card);
});

/* ── BUILD PRODUCT CARDS ── */
const prodTrack = document.getElementById('prodTrack');
productData.forEach(p => {
  const card = document.createElement('div');
  card.className = 'prod-card';
  card.innerHTML = `
    <div class="prod-img-area">
      <span class="prod-emoji">${p.emoji}</span>
    </div>
    <div class="prod-footer">
      <span class="prod-name">${p.name}</span>
    </div>`;
  prodTrack.appendChild(card);
});

/* ── CAROUSEL ENGINE ── */
function initCarousel(trackId, leftId, rightId) {
  const track   = document.getElementById(trackId);
  const btnL    = document.getElementById(leftId);
  const btnR    = document.getElementById(rightId);
  const VISIBLE = 4;
  let   step    = 0;

  function getCardW() {
    const c = track.children[0];
    return c ? c.offsetWidth + 12 : 0;
  }
  function maxStep() { return Math.max(0, track.children.length - VISIBLE); }

  function render() {
    const max = maxStep();
    step = Math.max(0, Math.min(step, max));
    track.style.transform = `translateX(-${step * getCardW()}px)`;
    btnL.disabled = step === 0;
    btnR.disabled = step >= max;
  }

  btnL.addEventListener('click',  () => { step--; render(); });
  btnR.addEventListener('click',  () => { step++; render(); });
  window.addEventListener('resize', render);
  render();
}

initCarousel('promoTrack', 'promoLeft',  'promoRight');
initCarousel('prodTrack',  'prodLeft',   'prodRight');

/* ── SIDEBAR ACTIVE ── */
document.querySelectorAll('.nav-link').forEach(link => {
  link.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    link.classList.add('active');
  });
});
</script>
</body>
</html>
