<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Department Store – Homepage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar">

  <div class="sidebar-logo">
    <div class="logo-icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </div>
    <span class="logo-text">Department<br>Store</span>
  </div>

  <nav class="sidebar-nav">
    <a class="nav-link active" href="index.html">Homepage</a>
    <a class="nav-link" href="ProductCatalog.html">Product Catalog</a>
    <a class="nav-link" href="ShopDirectory.html">Shop Directory</a>
  </nav>

</aside>

<!-- ══ MAIN ══ -->
<div class="main">

  <!-- TOPBAR -->
  <header class="topbar">
    <span class="topbar-title">Homepage</span>
    <button class="btn-login" onclick="window.location.href='login.html'">Login</button>
  </header>

  <!-- CONTENT -->
  <main class="content">

    <h1 class="page-title">Department Store</h1>

    <!-- PROMOTION SECTION -->
    <div class="section">
      <div class="section-label">Promotion</div>
      <div class="carousel-container">
        <button class="arrow-btn" id="promoLeft" aria-label="Previous" disabled>
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <div class="carousel-viewport">
          <div class="carousel-track" id="promoTrack">
              <!-- ข้อมูลโปรโมชันจะถูกแทรกที่นี่ผ่าน JavaScript -->
          </div>
        </div>
        <button class="arrow-btn" id="promoRight" aria-label="Next">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- PRODUCTS SECTION -->
    <div class="section">
      <div class="section-label">Products</div>
      <div class="carousel-container">
        <button class="arrow-btn" id="prodLeft" aria-label="Previous" disabled>
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <div class="carousel-viewport">
          <div class="carousel-track" id="prodTrack">
              <!-- ข้อมูลสินค้าจะถูกแทรกที่นี่ผ่าน JavaScript -->
          </div>
        </div>
        <button class="arrow-btn" id="prodRight" aria-label="Next">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    </div>

  </main>
</div>

<script src="js/public.js"></script>
</body>
</html>
