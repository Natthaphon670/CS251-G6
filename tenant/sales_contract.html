<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>Sales & Contract</title><link rel="stylesheet" href="style1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h1>Tenant Panel</h1>
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i> แผงควบคุม</a>
            <a href="store_sales_tracking.html" class="nav-item"><i class="fas fa-chart-line"></i> ประวัติการขาย</a>
            <a href="manage_product.html" class="nav-item"><i class="fas fa-box"></i> จัดการสินค้า</a>
            <a href="warehouse.html" class="nav-item"><i class="fas fa-warehouse"></i> คลังสินค้า</a>
            <a href="promotion.html" class="nav-item"><i class="fas fa-tags"></i> โปรโมชัน</a>
            <a href="sales_contract.html" class="nav-item active"><i class="fas fa-file-contract"></i> ยอดขายและสัญญา</a>
            <a href="supplier.html"       class="nav-item"><i class="fas fa-truck"></i>  Supplier</a>
        </div>
        <div class="main-content">
            <header>
                <h2>ยอดขายและสัญญา</h2>
                <button class="btn btn-danger btn-logout"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</button>
            </header>
            <p class="page-title">สัญญาและการเงิน</p>
            <p class="page-subtitle">ข้อมูลสัญญาเช่าและประวัติใบแจ้งหนี้ของร้านค้าคุณ</p>

            <div class="contract-card">
                <div class="contract-card-title"><i class="fas fa-file-signature"></i> ข้อมูลสัญญาเช่า</div>
                <div class="contract-info-grid">
                    <div class="info-item"><span class="info-label">รหัสสัญญา</span><span class="info-value">-</span></div>
                    <div class="info-item"><span class="info-label">พื้นที่</span><span class="info-value">-</span></div>
                    <div class="info-item"><span class="info-label">สถานะสัญญา</span><span class="badge-active">-</span></div>
                </div>
            </div>

            <div class="invoice-card">
                <div class="invoice-card-title"><i class="fas fa-file-invoice-dollar"></i> ใบแจ้งหนี้ (Invoice)</div>
                <table class="invoice-table">
                    <thead><tr><th>รหัสแจ้งหนี้</th><th>รอบเดือน</th><th>ยอดที่ต้องชำระ</th><th>สถานะ</th></tr></thead>
                    <tbody>
                         <!-- JS จะนำข้อมูลจริงมาใส่ตรงนี้ -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="../js/tenant.js"></script>
</body>
</html>
