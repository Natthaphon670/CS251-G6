<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>จัดการสินค้า</title>
    <link rel="stylesheet" href="style1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h1>Tenant Panel</h1>
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i> แผงควบคุม</a>
            <a href="store_sales_tracking.html" class="nav-item"><i class="fas fa-chart-line"></i> ประวัติการขาย</a>
            <a href="manage_product.html" class="nav-item active"><i class="fas fa-box"></i>    จัดการสินค้า</a>
            <a href="warehouse.html"      class="nav-item"><i class="fas fa-warehouse"></i>     คลังสินค้า</a>
            <a href="promotion.html"      class="nav-item"><i class="fas fa-tags"></i>          โปรโมชัน</a>
            <a href="sales_contract.html" class="nav-item"><i class="fas fa-file-contract"></i> ยอดขายและสัญญา</a>
            <a href="supplier.html"       class="nav-item"><i class="fas fa-truck"></i>  Supplier</a>
        </div>
        <div class="main-content">
            <header>
                <h2>จัดการสินค้า</h2>
                <button class="btn btn-danger btn-logout">
                    <i class="fas fa-sign-out-alt"></i> ออกจากระบบ
                </button>
            </header>

            <div class="form-card mp-card">
                <div class="form-card-title"><i class="fas fa-plus-circle"></i> เพิ่มข้อมูลสินค้าและหมวดหมู่</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>ชื่อหมวดหมู่ <span class="field-hint">(CategoryName)</span></label>
                        <div class="input-with-icon">
                            <i class="fas fa-layer-group"></i>
                            <input type="text" id="cat_name" placeholder="เช่น ของเล่นเด็ก">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>ชื่อสินค้า <span class="field-hint">(ProductName)</span></label>
                        <div class="input-with-icon"><i class="fas fa-tag"></i><input type="text" id="prod_name" placeholder="เช่น ตุ๊กตามีไซส์ L"></div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>ราคาสินค้า <span class="field-hint">(ProductPrice)</span></label>
                        <div class="input-suffix"><input type="number" id="prod_price" placeholder="0.00" min="0"><span class="suffix-label">฿</span></div>
                    </div>
                    <div class="form-group">
                        <label>รหัสผู้จัดจำหน่าย <span class="field-hint">(SupplierID)</span></label>
                        <div class="mp-select-wrapper">
                            <select id="sup_id" class="mp-select">
                                <option value="">— เลือกผู้จำหน่าย —</option>
                                <!-- JS จะดึงรายชื่อ Supplier มาใส่ตรงนี้ -->
                            </select>
                            <i class="fas fa-chevron-down mp-select-icon"></i>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>รายละเอียด <span class="field-hint">(ProductDescription)</span></label>
                    <textarea id="prod_desc" class="mp-textarea" rows="3" placeholder="รายละเอียดสินค้า..."></textarea>
                </div>
                <button class="btn-submit"><i class="fas fa-save"></i> บันทึกข้อมูลและสร้าง ProductID</button>
            </div>

            <div class="mp-table-card">
                <div class="mp-table-header">
                    <span><i class="fas fa-list"></i> รายการสินค้าทั้งหมด</span>
                    <div class="mp-search-box"><i class="fas fa-search"></i><input type="text" placeholder="ค้นหาสินค้า..."></div>
                </div>
                <div class="mp-table-wrap">
                    <table class="mp-table">
                        <thead><tr><th>รหัสสินค้า</th><th>ชื่อสินค้า</th><th>หมวดหมู่</th><th>ราคา BAHT</th><th>SupplierID</th></tr></thead>
                        <tbody>
                             <!-- JS จะนำข้อมูลจริงมาใส่ตรงนี้ -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/tenant.js"></script>
</body>
</html>
