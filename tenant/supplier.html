<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Supplier</title>
    <link rel="stylesheet" href="style1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">

        <!-- ── Sidebar ── -->
        <div class="sidebar">
            <h1>Tenant Panel</h1>
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i> แผงควบคุม</a>
            <a href="store_sales_tracking.html" class="nav-item"><i class="fas fa-chart-line"></i> ประวัติการขาย</a>
            <a href="manage_product.html" class="nav-item"><i class="fas fa-box"></i>            จัดการสินค้า</a>
            <a href="warehouse.html"      class="nav-item"><i class="fas fa-warehouse"></i>     คลังสินค้า</a>
            <a href="promotion.html"      class="nav-item"><i class="fas fa-tags"></i>          โปรโมชัน</a>
            <a href="sales_contract.html" class="nav-item"><i class="fas fa-file-contract"></i> ยอดขายและสัญญา</a>
            <a href="supplier.html"       class="nav-item active"><i class="fas fa-truck"></i>  Supplier</a>
        </div>

        <!-- ── Main Content ── -->
        <div class="main-content">
            <header>
                <h2>Supplier</h2>
                <button class="btn btn-danger btn-logout">
                    <i class="fas fa-sign-out-alt"></i> ออกจากระบบ
                </button>
            </header>

            <!-- Form card -->
            <div class="form-card mp-card mp-supplier-card">
                <div class="form-card-title">
                    <i class="fas fa-truck"></i> เพิ่มผู้จัดจำหน่ายใหม่
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>ชื่อผู้จัดจำหน่าย <span class="field-hint">(SupplierName)</span></label>
                        <div class="input-with-icon">
                            <i class="fas fa-building"></i>
                            <input type="text" placeholder="เช่น โรงงาน A">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>ข้อมูลการติดต่อ <span class="field-hint">(ContactInfo)</span></label>
                        <div class="input-with-icon">
                            <i class="fas fa-phone"></i>
                            <input type="text" placeholder="เช่น 02-123-4567">
                        </div>
                    </div>
                </div>

                <button class="btn-submit btn-submit-green">
                    <i class="fas fa-plus"></i> บันทึกและสร้าง SupplierID
                </button>
            </div>

            <!-- Supplier table card -->
            <div class="mp-table-card">
                <div class="mp-table-wrap">
                    <table class="mp-table">
                        <thead>
                            <tr>
                                <th>รหัส (SupplierID)</th>
                                <th>ชื่อผู้จัดจำหน่าย</th>
                                <th>ติดต่อ</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><span class="mp-code">SUP001</span></td>
                                <td>บริษัท เฟอร์นิเจอร์ไทย</td>
                                <td>02-111-2222</td>
                            </tr>
                            <tr>
                                <td><span class="mp-code">SUP002</span></td>
                                <td>บริษัท แฟชั่นพลัส</td>
                                <td>info@fashionplus.co.th</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div><!-- /main-content -->
    </div><!-- /dashboard-container -->

    <script src="../js/tenant.js"></script>
</body>
</html>
