<!DOCTYPE html>

<head>

    <title>Tenant Dashboard</title>

<body>

            <a href="index.html" class="nav-item active"><i class="fas fa-home"></i> แผงควบคุม</a>
            <a href="manage_product.html" class="nav-item"><i class="fas fa-box"></i> จัดการสินค้า</a>
