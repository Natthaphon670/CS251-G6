<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>Promotion</title><link rel="stylesheet" href="style1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h1>Tenant Panel</h1>
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i> แผงควบคุม</a>
            <a href="manage_product.html" class="nav-item"><i class="fas fa-box"></i> จัดการสินค้า</a>
            <a href="warehouse.html" class="nav-item"><i class="fas fa-warehouse"></i> คลังสินค้า</a>
            <a href="promotion.html" class="nav-item active"><i class="fas fa-tags"></i> โปรโมชัน</a>
            <a href="sales_contract.html" class="nav-item"><i class="fas fa-file-contract"></i> ยอดขายและสัญญา</a>
        </div>
        <div class="main-content">
            <header>
                <h2>โปรโมชัน</h2>
                <button class="btn btn-danger btn-logout">
                    <i class="fas fa-sign-out-alt"></i> ออกจากระบบ
                </button>
            </header>

            <div class="page-wrapper">
                <p class="page-title">สร้างโปรโมชันใหม่</p>
                <p class="page-subtitle">กรอกข้อมูลด้านล่างเพื่อสร้างโปรโมชันสำหรับร้านค้าของคุณ</p>

                <div class="form-card">
                    <div class="form-card-title">
                        <i class="fas fa-tags"></i> รายละเอียดโปรโมชัน
                    </div>

                    <div class="form-group">
                        <label>ชื่อโปรโมชัน</label>
                        <div class="input-with-icon">
                            <i class="fas fa-pen"></i>
                            <input type="text" placeholder="เช่น ลดราคาฤดูร้อน 2567">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>วันที่เริ่ม</label>
                            <div class="input-with-icon">
                                <i class="fas fa-calendar-alt"></i>
                                <input type="date">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>วันที่สิ้นสุด</label>
                            <div class="input-with-icon">
                                <i class="fas fa-calendar-check"></i>
                                <input type="date">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>ส่วนลด</label>
                        <div class="input-suffix">
                            <input type="number" placeholder="0" min="1" max="100">
                            <span class="suffix-label">%</span>
                        </div>
                    </div>

                    <button class="btn-submit">
                        <i class="fas fa-check-circle"></i> ยืนยันการใช้โปรโมชัน
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/tenant.js"></script>
</body>
</html>
