<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>Warehouse</title><link rel="stylesheet" href="style1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h1>Tenant Panel</h1>
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i> แผงควบคุม</a>
            <a href="store_sales_tracking.html" class="nav-item"><i class="fas fa-chart-line"></i> ประวัติการขาย</a>
            <a href="manage_product.html" class="nav-item"><i class="fas fa-box"></i> จัดการสินค้า</a>
            <a href="warehouse.html" class="nav-item active"><i class="fas fa-warehouse"></i> คลังสินค้า</a>
            <a href="promotion.html" class="nav-item"><i class="fas fa-tags"></i> โปรโมชัน</a>
            <a href="sales_contract.html" class="nav-item"><i class="fas fa-file-contract"></i> ยอดขายและสัญญา</a>
            <a href="supplier.html"       class="nav-item"><i class="fas fa-truck"></i>  Supplier</a>
        </div>
        <div class="main-content">
            <header>
                <h2>คลังสินค้า</h2>
                <button class="btn btn-danger btn-logout"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</button>
            </header>
            <div class="content-box">
                <h3>สต็อกสินค้าปัจจุบัน</h3>
                <table>
                    <thead><tr><th>PID</th><th>ชื่อสินค้า</th><th>จำนวนในคลัง</th><th>เติมสินค้า</th></tr></thead>
                    <tbody>
                         <!-- JS จะนำข้อมูลจริงมาใส่ตรงนี้ -->
                    </tbody>
                </table>
            </div>
            <div class="form-card" style="margin-bottom: 2rem;">
                <div class="form-card-title">
                    <i class="fas fa-box-open"></i> นำเข้าสินค้าใหม่เข้าคลัง (ผูกคลังสินค้าครั้งแรก)
                </div>
                <!-- ปรับกริดให้มี 4 ช่อง: สินค้า | คลังสินค้า | จำนวน | ปุ่ม -->
                <div class="form-row" style="grid-template-columns: 1.5fr 1fr 1fr auto; align-items: end; gap: 1rem;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>เลือกสินค้าที่มีในระบบ</label>
                        <select id="select-product" class="mp-select" style="width: 100%; height: 45px;">
                            <option value="">— กำลังโหลดรายการสินค้า —</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>รหัสคลังสินค้า (Warehouse ID)</label>
                        <input type="text" id="warehouse-id" placeholder="เช่น W00001" style="height: 45px;">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>จำนวนเริ่มต้น</label>
                        <input type="number" id="new-qty" placeholder="0" min="1" style="height: 45px;">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <button class="btn-submit btn-submit-green" id="btn-add-to-store" style="margin-top: 0; padding: 0.8rem 1.5rem; height: 45px;">
                            <i class="fas fa-plus"></i> เพิ่มเข้าคลัง
                        </button>
                    </div>
                </div>
                <small style="color: #64748b; margin-top: 10px; display: block;">* ระบุรหัสคลังที่ต้องการเก็บสินค้านี้ หากมีอยู่แล้วระบบจะเพิ่มจำนวนให้</small>
            </div>
        </div>
    </div>
    <script src="../js/tenant.js"></script>
</body>
</html>
