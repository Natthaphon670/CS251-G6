<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Store Sales Tracking</title>
    <link rel="stylesheet" href="style1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h1>Tenant Panel</h1>
            <a href="index.html"               class="nav-item"><i class="fas fa-home"></i>            แผงควบคุม</a>
            <a href="store_sales_tracking.html" class="nav-item active"><i class="fas fa-chart-line"></i> ประวัติการขาย</a>
            <a href="manage_product.html"      class="nav-item"><i class="fas fa-box"></i>             จัดการสินค้า</a>
            <a href="warehouse.html"           class="nav-item"><i class="fas fa-warehouse"></i>       คลังสินค้า</a>
            <a href="promotion.html"           class="nav-item"><i class="fas fa-tags"></i>            โปรโมชัน</a>
            <a href="sales_contract.html"      class="nav-item"><i class="fas fa-file-contract"></i>   ยอดขายและสัญญา</a>
            <a href="supplier.html"            class="nav-item"><i class="fas fa-truck"></i>           Supplier</a>
        </div>
        <div class="main-content">
            <header>
                <h2>Store Sales Tracking</h2>
                <button class="btn btn-danger btn-logout"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</button>
            </header>
            <div class="sst-filter-card">
                <p class="sst-section-label">ประวัติการขายสินค้าของร้าน</p>
                <div class="sst-filter-row">
                    <div class="sst-date-group">
                        <label>ตั้งแต่</label>
                        <div class="sst-date-input-wrap"><input type="date"></div>
                    </div>
                    <div class="sst-date-group">
                        <label>ถึง</label>
                        <div class="sst-date-input-wrap"><input type="date"></div>
                    </div>
                    <button class="sst-btn-search"><i class="fas fa-search"></i> ค้นหา</button>
                </div>
            </div>
            <div class="sst-table-card">
                <div class="sst-table-wrap">
                    <table class="sst-table">
                        <thead><tr><th>รหัสการขาย</th><th>เวลา</th><th>รหัสสินค้า</th><th>ชื่อสินค้า</th><th>จำนวน</th><th>ยอดรวม(Baht)</th></tr></thead>
                        <tbody>
                            <!-- JS จะนำข้อมูลจริงมาใส่ตรงนี้ -->
                        </tbody>
                    </table>
                </div>
                <div class="sst-total-row">
                    <span class="sst-total-label">ยอดรวมทั้งหมดในตาราง</span>
                    <span class="sst-total-value">0</span>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/tenant.js"></script>
</body>
</html>
