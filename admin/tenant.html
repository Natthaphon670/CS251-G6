<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Tenant Directory</title>
    <link rel="stylesheet" href="../css/admin_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body data-page-role="admin-only">
   <aside class="sidebar">
        <div class="sidebar-logo"> DEPARTMENT STORE</div>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-link" data-allowed="all">Dashboard</a>
            <a href="employee.html" class="nav-link" data-allowed="admin-only">Employee Management</a>
            <a href="tenant.html" class="nav-link active" data-allowed="admin-only">Tenant Directory</a>
            <a href="space.html" class="nav-link" data-allowed="all">Space Management</a>
            <a href="lease.html" class="nav-link" data-allowed="admin-only">Lease Contract</a>
            <a href="warehouse.html" class="nav-link" data-allowed="all">Warehouse</a>
            <a href="sales.html" class="nav-link" data-allowed="all">Sales Management</a>
            <a href="reports.html" class="nav-link" data-allowed="employee-only">Report Generation</a>
            <a href="invoice.html" class="nav-link" data-allowed="all">Invoice</a>
        </nav>
    </aside>
    
    <main class="main-content">
         <header class="topbar">
            <div class="page-info"><h2>Employee Management</h2></div>
            <div class="header-actions">
                <div class="profile-menu">
                    <div class="profile-trigger" onclick="toggleDropdown(event)">
                        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Profile" class="profile-avatar">
                        <span class="admin-name">User</span>
                        <span class="dropdown-icon">▼</span>
                    </div>
                    <div class="dropdown-content" id="profileDropdown">
                        <a href="../login.html" class="logout-link"><span>🚪</span> Logout</a>
                    </div>
                </div>
            </div>
        </header>
        <div class="content-wrapper">
            <div class="card">
                <h3>รายชื่อผู้เช่าร้านค้า</h3>
                <table>
                    <thead><tr><th>Shop Name</th><th>Category</th><th>Contact Person</th><th>Email</th><th>Action</th></tr></thead>
                    <tbody id="tenantTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="tenantModal" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background: rgba(0,0,0,0.5);">
    <div class="modal-content" style="background:#fff; margin:10% auto; padding:20px; width:500px; border-radius:8px;">
        <h3 style="margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;">ลงทะเบียนร้านค้าใหม่</h3>
        <form id="addTenantForm" style="display:grid; gap:10px;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="text" name="tenant_id" placeholder="รหัสร้านค้า (T0000X)" required style="padding:8px;">
                <input type="text" name="account_id" placeholder="รหัสบัญชี (A0000X)" required style="padding:8px;">
            </div>
            <input type="text" name="tenant_name" placeholder="ชื่อร้านค้า" required style="padding:8px;">
            <input type="text" name="category" placeholder="หมวดหมู่ร้านค้า" required style="padding:8px;">
            <input type="text" name="contact_info" placeholder="ข้อมูลติดต่อ / เบอร์โทร" required style="padding:8px;">
            <hr>
            <input type="text" name="username" placeholder="Username สำหรับร้านค้า" required style="padding:8px;">
            <input type="password" name="password" placeholder="Password" required style="padding:8px;">
            <div style="display:flex; justify-content: flex-end; gap:10px; margin-top:10px;">
                <button type="button" onclick="closeModal('tenantModal')" style="padding:8px 15px; background:#ccc; border:none; border-radius:4px; cursor:pointer;">ยกเลิก</button>
                <button type="submit" style="padding:8px 15px; background:#007bff; color:white; border:none; border-radius:4px; cursor:pointer;">บันทึกข้อมูล</button>
            </div>
        </form>
    </div>
</div>

<div id="editTenantModal" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background: rgba(0,0,0,0.5);">
    <div class="modal-content" style="background:#fff; margin:10% auto; padding:20px; width:450px; border-radius:8px;">
        <h3>แก้ไขข้อมูลร้านค้า</h3>
        <form id="editTenantForm" style="display:grid; gap:10px; margin-top:15px;">
            <input type="hidden" name="tenant_id"> <label style="font-size: 14px;">ชื่อร้านค้า:</label>
            <input type="text" name="tenant_name" required style="padding:8px;">
            <label style="font-size: 14px;">หมวดหมู่:</label>
            <input type="text" name="category" required style="padding:8px;">
            <label style="font-size: 14px;">ข้อมูลติดต่อ (Contact):</label>
            <input type="text" name="contact_info" required style="padding:8px;">
            
            <div style="display:flex; justify-content: flex-end; gap:10px; margin-top:10px;">
                <button type="button" onclick="closeModal('editTenantModal')" style="padding:8px 15px; background:#ccc; border:none; border-radius:4px; cursor:pointer;">ยกเลิก</button>
                <button type="submit" style="padding:8px 15px; background:#28a745; color:white; border:none; border-radius:4px; cursor:pointer;">บันทึกการแก้ไข</button>
            </div>
        </form>
    </div>
</div>

    <script src="../js/admin.js"></script>
    <script src="../js/admin_auth.js"></script>
</body>
</html>
