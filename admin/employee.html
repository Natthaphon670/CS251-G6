<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Employee Management</title>
    <link rel="stylesheet" href="../css/admin_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body data-page-role="admin-only">
    <aside class="sidebar">
        <div class="sidebar-logo"> DEPARTMENT STORE</div>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-link" data-allowed="all">Dashboard</a>
            <a href="employee.html" class="nav-link active" data-allowed="admin-only">Employee Management</a>
            <a href="tenant.html" class="nav-link" data-allowed="admin-only">Tenant Directory</a>
            <a href="space.html" class="nav-link" data-allowed="all">Space Management</a>
            <a href="lease.html" class="nav-link" data-allowed="admin-only">Lease Contract</a>
            <a href="warehouse.html" class="nav-link" data-allowed="all">Warehouse</a>
            <a href="sales.html" class="nav-link" data-allowed="all">Sales Management</a>
            <a href="reports.html" class="nav-link" data-allowed="employee-only">Report Generation</a>
            <a href="invoice.html" class="nav-link" data-allowed="all">Invoice</a>
        </nav>
    </aside>
    
    <main class="main-content">
         <header class="topbar">
            <div class="page-info"><h2>Employee Management</h2></div>
            <div class="header-actions">
                <div class="profile-menu">
                    <div class="profile-trigger" onclick="toggleDropdown(event)">
                        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Profile" class="profile-avatar">
                        <span class="admin-name">User</span>
                        <span class="dropdown-icon">▼</span>
                    </div>
                    <div class="dropdown-content" id="profileDropdown">
                        <a href="../login.html" class="logout-link"><span>🚪</span> Logout</a>
                    </div>
                </div>
            </div>
        </header>
        
        <div class="content-wrapper">
            <div class="card">
                <div class="card-header">
                    <h3>จัดการพนักงาน</h3>
                    <button class="btn btn-primary">+ Add Employee</button>
                </div>
                <table>
                    <thead><tr><th>Name</th><th>Position</th><th>Role</th><th>Telephone</th></tr></thead>
                    <tbody id="employeeTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="employeeModal" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background: rgba(0,0,0,0.5);">
    <div class="modal-content" style="background:#fff; margin:10% auto; padding:20px; width:500px; border-radius:8px;">
        <h3 style="margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;">เพิ่มข้อมูลพนักงานใหม่</h3>
        <form id="addEmployeeForm" style="display:grid; gap:10px;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="text" name="employee_id" placeholder="รหัสพนักงาน (E0000X)" required style="padding:8px;">
                <input type="text" name="account_id" placeholder="รหัสบัญชี (A0000X)" required style="padding:8px;">
            </div>
            <input type="text" name="employee_name" placeholder="ชื่อ-นามสกุล" required style="padding:8px;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="text" name="position" placeholder="ตำแหน่ง" required style="padding:8px;">
                <input type="text" name="telephone" placeholder="เบอร์โทรศัพท์" required style="padding:8px;">
            </div>
            <hr>
            <input type="text" name="username" placeholder="Username สำหรับ Login" required style="padding:8px;">
            <input type="password" name="password" placeholder="Password" required style="padding:8px;">
            <select name="role" required style="padding:8px;">
                <option value="Employee">Employee (พนักงานทั่วไป)</option>
                <option value="Admin">Admin (ผู้ดูแลระบบ)</option>
            </select>
            <div style="display:flex; justify-content: flex-end; gap:10px; margin-top:10px;">
                <button type="button" onclick="closeModal('employeeModal')" style="padding:8px 15px; background:#ccc; border:none; border-radius:4px; cursor:pointer;">ยกเลิก</button>
                <button type="submit" style="padding:8px 15px; background:#007bff; color:white; border:none; border-radius:4px; cursor:pointer;">บันทึกข้อมูล</button>
            </div>
        </form>
    </div>
</div>

    <script src="../js/admin.js"></script>
    <script src="../js/admin_auth.js"></script>

    
</body>
</html>
