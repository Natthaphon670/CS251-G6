<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop Directory - Department Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
      .shop-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
          gap: 20px;
          margin-top: 20px;
      }
      .shop-card {
          background: white;
          padding: 20px;
          border-radius: 8px;
          border: 1px solid #eee;
          box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      }
  </style>
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </div>
    <span class="logo-text">Department<br>Store</span>
  </div>

  <nav class="sidebar-nav">
    <a class="nav-link" href="index.html">Homepage</a>
    <a class="nav-link" href="ProductCatalog.html">Product Catalog</a>
    <!-- เปลี่ยน class active มาไว้ที่หน้านี้ -->
    <a class="nav-link active" href="ShopDirectory.html">Shop Directory</a>
  </nav>
</aside>

<!-- ══ MAIN ══ -->
<div class="main">

  <header class="topbar">
    <span class="topbar-title">Shop Directory</span>
    <button class="btn-login" onclick="window.location.href='login.html'">Login</button>
  </header>

  <main class="content">
    <h1 class="page-title">รายชื่อร้านค้าในห้าง</h1>

    <!-- พื้นที่สำหรับแสดงรายชื่อร้านค้า -->
    <div id="shopGrid" class="shop-grid">
      <p style="color: #666;">กำลังโหลดข้อมูลร้านค้า...</p>
    </div>

  </main>
</div>

<script src="js/public.js"></script>
</body>
</html>
