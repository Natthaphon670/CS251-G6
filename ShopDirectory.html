<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Department Store – Shop Directory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shoprirectory.css">
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </div>
    <span class="logo-text">Department<br>Store</span>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-link" href="index.html">Homepage</a>
    <a class="nav-link" href="ProductCatalog.html">Product Catalog</a>
    <a class="nav-link active" href="#">Shop Directory</a>
  </nav>
</aside>

<!-- ══ MAIN ══ -->
<div class="main">

  <!-- TOPBAR -->
  <header class="topbar">
    <span class="topbar-title">Shop Directory</span>
    <button class="btn-login" onclick="window.location.href='index.html'">Login</button>
  </header>

  <!-- CONTENT -->
  <main class="content">

    <!-- SEARCH -->
    <div class="search-wrap">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Shop name search"/>
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
    </div>

    <!-- TABLE CARD -->
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Shop Name</th>
            <th>Category</th>
            <th>Contact Person</th>
            <th>ContactInfo</th>
            <th>Floor&amp;Location</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>

      <!-- PAGINATION inside card -->
      <div class="pagination-wrap" id="pagination"></div>
    </div>

  </main>
</div>

<script>
/* ── DATA ── */
const allShops = [
  { name: 'บจก. แสนดี เอสเตท', cat: 'clothing', contact: 'kantanop klinhom', email: 'info@sandee.com', floor: 'Floor 10, Zone A' },
  { name: 'บจก. แสนดี เอสเตท', cat: 'clothing', contact: 'kantanop klinhom', email: 'info@sandee.com', floor: 'Floor 10, Zone A' },
  { name: 'บจก. แสนดี เอสเตท', cat: 'clothing', contact: 'kantanop klinhom', email: 'info@sandee.com', floor: 'Floor 10, Zone A' },
  { name: 'บจก. แสนดี เอสเตท', cat: 'clothing', contact: 'kantanop klinhom', email: 'info@sandee.com', floor: 'Floor 10, Zone A' },
  { name: 'บจก. แสนดี เอสเตท', cat: 'clothing', contact: 'kantanop klinhom', email: 'info@sandee.com', floor: 'Floor 10, Zone A' },
  { name: 'ร้านทองสุขใจ',        cat: 'jewelry',  contact: 'somchai jaidee',   email: 'gold@suki.com',   floor: 'Floor 3, Zone B' },
  { name: 'ร้านทองสุขใจ',        cat: 'jewelry',  contact: 'somchai jaidee',   email: 'gold@suki.com',   floor: 'Floor 3, Zone B' },
  { name: 'ร้านอาหารอร่อยดี',    cat: 'food',     contact: 'wilai aroidee',    email: 'food@aroi.com',   floor: 'Floor 1, Zone C' },
];

const PER_PAGE = 5;
let   page     = 1;
let   query    = '';

function filtered() {
  return allShops.filter(s => s.name.includes(query) || query === '');
}

function render() {
  const data  = filtered();
  const total = Math.ceil(data.length / PER_PAGE) || 1;
  if (page > total) page = 1;

  const slice = data.slice((page - 1) * PER_PAGE, page * PER_PAGE);
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  slice.forEach(s => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${s.name}</td>
      <td>${s.cat}</td>
      <td>${s.contact}</td>
      <td>${s.email}</td>
      <td>${s.floor}</td>`;
    tbody.appendChild(tr);
  });

  renderPagination(total);
}

function renderPagination(total) {
  const el = document.getElementById('pagination');
  el.innerHTML = '';

  const prev = document.createElement('button');
  prev.className = 'page-btn';
  prev.textContent = 'previous';
  prev.disabled = page === 1;
  prev.onclick = () => { page--; render(); };
  el.appendChild(prev);

  for (let i = 1; i <= total; i++) {
    const btn = document.createElement('button');
    btn.className = 'page-num' + (i === page ? ' active' : '');
    btn.textContent = i;
    btn.onclick = () => { page = i; render(); };
    el.appendChild(btn);
  }

  const next = document.createElement('button');
  next.className = 'page-btn';
  next.textContent = 'next';
  next.disabled = page === total;
  next.onclick = () => { page++; render(); };
  el.appendChild(next);
}

document.getElementById('searchInput').addEventListener('input', e => {
  query = e.target.value.trim();
  page  = 1;
  render();
});

render();
</script>
</body>
</html>
