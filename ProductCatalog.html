<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Catalog - Department Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
      /* เพิ่ม CSS สำหรับ Grid ให้แสดง Card สินค้าเรียงกันสวยงาม */
     #productGrid.product-grid {
          display: grid !important;
          grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)) !important;
          gap: 25px !important;
          align-items: stretch !important;
      }

      /* บังคับการ์ดให้ขยายเต็มช่อง */
      #productGrid .prod-card {
          width: 100% !important;
          min-width: 0 !important;
          display: flex !important;
          flex-direction: column !important;
          height: auto !important;
      }

      /* ดันเนื้อหาและการจัดเรียงข้อความไม่ให้ตกบรรทัด */
      #productGrid .card-name {
          flex-grow: 1 !important;
          display: flex !important;
          flex-direction: column !important;
          justify-content: space-between !important;
          white-space: normal !important;
          word-break: break-word !important;
      }
  </style>
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </div>
    <span class="logo-text">Department<br>Store</span>
  </div>

  <nav class="sidebar-nav">
    <a class="nav-link" href="index.html">Homepage</a>
    <!-- เปลี่ยน class active มาไว้ที่หน้านี้ -->
    <a class="nav-link active" href="ProductCatalog.html">Product Catalog</a>
    <a class="nav-link" href="ShopDirectory.html">Shop Directory</a>
  </nav>
</aside>

<!-- ══ MAIN ══ -->
<div class="main">

  <!-- TOPBAR -->
  <header class="topbar">
    <span class="topbar-title">Product Catalog</span>
    <button class="btn-login" onclick="window.location.href='login.html'">Login</button>
  </header>

  <!-- CONTENT -->
  <main class="content">
    <h1 class="page-title">Product Catalog</h1>

    <!-- พื้นที่สำหรับแสดงสินค้า -->
    <div id="productGrid" class="product-grid">
      <p style="color: #666;">กำลังโหลดข้อมูลสินค้า...</p>
    </div>

  </main>
</div>

<script src="js/public.js"></script>
</body>
</html>
